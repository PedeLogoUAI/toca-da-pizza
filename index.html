<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toca da Pizza - Cardápio Digital</title>
  <link rel="stylesheet" href="styles.css">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
</head>
<body>
  <header>
    <div class="header-top">
      <div class="header-content">
        <div class="logo-circle">
          <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj2apEl5ctXcQOu94B3u9mCv_ufaZRAZOwhBPhyphenhyphenR_OVeP0iY7kFAUiF4-K-tKOH2mm4rp9uVKSLdQGkUwux47FAkHbjps7-FKHZp_GBpgsytipVQUHHWzsvTZiLNEyZ-lXk1ReWUO84_XeQoJJmGlbAs6yTfEYQhE5U48Df2o2-GaHE73_RccrmhlelHo8/s1600/logo.jpg" alt="Logo">
        </div>
        <div class="header-text">
          <div class="header-title">Toca da Pizza</div>
          <div class="header-subtitle">Aprecie os sabores da Toca.</div>
        </div>
      </div>
      <div class="sacola-container">
        <img id="sacola-icon" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiotlF11hWNzLOEimVZlSAGoL3yigGVuOEbmjvvZyQvYQsb3wa3a_YCR2JlI0OZdWZTpjdyO0d4TSd_PVuEaC_BQTXRxWGiNk4SASWK9JY54FehzlvTWIDI1AbTGs-DrXZ4P_DJaW_wJt3USV72UlcdWrxbnr7bczEmfUyybSL7s31qN1yARN8vtQxuInk/s1600/sacola-de-compras.png" class="sacola-icon">
        <div id="sacola-counter" class="sacola-counter">0</div>
      </div>
    </div>
    <div class="header-bottom">
      <a href="#" id="nav-voltar" class="nav-link">← Voltar</a>
      <a href="#" id="nav-perfil" class="nav-link">Perfil da Loja →</a>
    </div>
  </header>

  <div class="container">
    <div id="pagina-carregamento" class="pagina">
      <div class="loading-container">
        <div class="loading-logo">
          <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj2apEl5ctXcQOu94B3u9mCv_ufaZRAZOwhBPhyphenhyphenR_OVeP0iY7kFAUiF4-K-tKOH2mm4rp9uVKSLdQGkUwux47FAkHbjps7-FKHZp_GBpgsytipVQUHHWzsvTZiLNEyZ-lXk1ReWUO84_XeQoJJmGlbAs6yTfEYQhE5U48Df2o2-GaHE73_RccrmhlelHo8/s1600/logo.jpg" alt="Logo">
        </div>
        <div class="loading-text">Aguarde...</div>
      </div>
    </div>

    <div id="pagina-categorias" class="pagina">
      <h1>Categorias</h1>
      <div id="lista-categorias"></div>
    </div>

    <div id="pagina-produtos" class="pagina">
      <h1 id="titulo-categoria"></h1>
      <div id="lista-produtos" style="margin-top: 20px;"></div>
    </div>

    <div id="pagina-perfil" class="pagina">
      <h1>Perfil da loja</h1>
      <div class="card-cinza">
        <h2>Horário de atendimento</h2>
        <div id="horarios" style="margin-top: 10px;"></div>
      </div>
    </div>

    <div id="pagina-sacola" class="pagina">
      <h1>Sacola de Compras</h1>
      <div id="itens-sacola"></div>
      <div id="resumo-pedido" class="card-cinza" style="text-align: right;"></div>
      <button id="btn-finalizar" class="btn-vermelho">Finalizar Compra</button>
    </div>

    <div id="pagina-finalizar" class="pagina">
      <h1>Finalizar Compra</h1>
      <div id="resumo-final" class="card-cinza"></div>
      <div class="card-cinza">
        <h2>Formas de pagamento</h2>
        <div id="formas-pagamento" style="margin-top: 10px;"></div>
      </div>
      <div id="dados-cliente" class="card-cinza">
        <h2>Dados para Entrega</h2>
        <div id="dados-cliente-content"></div>
        <button id="btn-editar-dados" class="btn-editar">Editar Dados</button>
      </div>
      <button id="btn-confirmar" class="btn-vermelho">Confirmar Pedido</button>
    </div>

    <div id="pagina-dados-cliente" class="pagina">
      <h1>Dados do Cliente</h1>
      <form id="form-cliente" style="margin-top: 20px;">
        <div class="form-group">
          <label for="nome">Nome:</label>
          <input type="text" id="nome" required>
        </div>
        <div class="form-group">
          <label for="telefone">Telefone:</label>
          <input type="tel" id="telefone" required>
        </div>
        <div class="form-group">
          <label for="endereco">Endereço:</label>
          <input type="text" id="endereco" required>
        </div>
        <button type="submit" class="btn-vermelho">Salvar</button>
      </form>
    </div>
  </div>

  <footer>
    <p>PedeLogoUAI &copy;2025</p>
  </footer>

  <audio id="sound-effect" src="livechat-129007.mp3" preload="auto"></audio>
  <script src="script.js"></script>
</body>
</html>
